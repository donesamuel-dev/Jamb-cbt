<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB CBT Practice</title>

  <!-- Paystack -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div id="start-screen">
      <h1>JAMB CBT Practice</h1>
      <p>Select a subject to start</p>
      <div class="subject-buttons">
        <button onclick="startTest('english')">English</button>
        <button onclick="startTest('maths')">Mathematics</button>
        <button onclick="startTest('physics')">Physics</button>
      </div>
    </div>

    <div id="quiz-screen" style="display:none;">
      <div class="quiz-header">
        <span id="q-counter">Q1/20</span>
        <span id="timer">60:00</span>
      </div>
      <h2 id="question">Question goes here</h2>
      <div id="options"></div>
      <button onclick="nextQuestion()" id="next-btn">Next</button>
    </div>

    <div id="result-screen" style="display:none;">
      <h1>Test Complete</h1>
      <h2 id="score">Score: 0/20</h2>
      <button onclick="restart()">Restart</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
