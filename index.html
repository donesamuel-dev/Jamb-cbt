<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB CBT Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div id="start-screen">
      <h1>JAMB CBT Practice</h1>
      
      <div class="mode-select">
        <button onclick="setMode('practice')">Practice Mode</button>
        <button onclick="setMode('challenge')">Challenge Mode</button>
      </div>

      <p>Select a subject to start</p>
      <div class="subject-buttons">
        <button onclick="startTest('english')">English</button>
        <button onclick="startTest('maths')">Mathematics</button>
        <button onclick="startTest('physics')">Physics</button>
      </div>

      <div class="tutorial">
        <h3>How to Use</h3>
        <iframe width="100%" height="250" 
          src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
          frameborder="0" allowfullscreen>
        </iframe>
      </div>
    </div>

    <div id="quiz-screen" style="display:none;">
      <div class="quiz-header">
        <span id="q-counter">Q1/20</span>
        <span id="timer">60:00</span>
        <span id="lives" style="display:none;">Lives: 3</span>
      </div>
      <h2 id="question">Question goes here</h2>
      <div id="options"></div>
      <button onclick="nextQuestion()" id="next-btn">Next</button>
    </div>

    <div id="result-screen" style="display:none;">
      <h1>Test Complete</h1>
      <h2 id="score">Score: 0/20</h2>
      <button onclick="restart()">Restart</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
