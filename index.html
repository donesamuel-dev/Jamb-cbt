<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMB CBT Practice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="start-screen">
    <h2>JAMB CBT Practice</h2>
    <p>Pick a subject to start</p>
    <button onclick="startTest('english')">English</button>
    <button onclick="startTest('maths')">Maths</button>
    <button onclick="startTest('physics')">Physics</button>
  </div>

  <div id="quiz-screen" style="display:none;">
    <div class="top-bar">
      <span id="timer">60:00</span>
      <span id="q-counter">Q1/20</span>
    </div>
    <div id="question-box">
      <h3 id="question"></h3>
      <div id="options"></div>
      <button id="next-btn" onclick="nextQuestion()">Next</button>
    </div>
  </div>

  <div id="result-screen" style="display:none;">
    <h2>Test Finished!</h2>
    <h3 id="score"></h3>
    <button onclick="reviewAnswers()">Review Answers</button>
    <button onclick="restart()">Retake Test</button>
    <div id="review" style="display:none;"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
